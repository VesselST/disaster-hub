services:
  disaster_db:
    image: postgis/postgis:15-3.3
    container_name: disaster_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  disaster_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: disaster_app
    volumes:
      - .:/app
      - chroma_cache:/root/.cache/chroma
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - disaster_db
      - ollama


volumes:
  db_data:
  ollama_data:
  chroma_cache:
