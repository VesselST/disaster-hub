<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Disaster Hub | Full Logic 3D</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root { --bg: #05070a; --glass: rgba(13, 17, 23, 0.9); --accent: #00d4ff; --border: rgba(255, 255, 255, 0.1); --radius: 16px; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #f0f6fc; font-family: 'Inter', sans-serif; overflow: hidden; justify-content: space-between; }
        
        .panel { width: 300px; background: var(--glass); backdrop-filter: blur(15px); padding: 20px; border: 1px solid var(--border); margin: 15px; border-radius: var(--radius); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #middle-panel { flex-grow: 1; position: relative; z-index: 1; }
        
        h2 { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        h2::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

        label { font-size: 0.7rem; color: #8b949e; margin-top: 12px; display: block; }
        select, input, button { width: 100%; padding: 10px; margin-top: 5px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; border-radius: 10px; font-size: 0.8rem; outline: none; }
        button.primary { background: var(--accent); color: black; font-weight: bold; cursor: pointer; border: none; margin-top: 15px; }
        button.danger { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; margin-top: 8px; cursor: pointer; }

        #chat-container { flex-grow: 1; overflow-y: auto; margin: 15px 0; font-size: 0.8rem; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); border-left: 3px solid transparent; }
        .msg-ai { border-left-color: var(--accent); background: rgba(0, 212, 255, 0.05); }
        .msg-user { text-align: right; }
        .msg-loading { border-left-color: #8b949e; color: #8b949e; font-style: italic; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div class="panel" id="left-panel">
        <h2>🛰️ 衛星監控控制台</h2>
        <label>觀測區域</label>
        <select id="city-select">
            <option value="all">🌐 全東部區域</option>
            <option value="YILAN">📍 宜蘭</option>
            <option value="HUALIEN">📍 花蓮</option>
            <option value="TAITUNG">📍 台東</option>
        </select>

        <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
            <h2>🏠 災害模擬設定</h2>
            
            <label>模擬中心 (地區)</label>
            <select id="loc-preset">
                <option value="121.60,23.98">花蓮市中心</option>
                <option value="121.75,24.75">宜蘭市中心</option>
                <option value="121.13,22.75">台東市中心</option>
            </select>

            <label>災害類型</label>
            <select id="sim-type">
                <option value="earthquake">🔴 強震模擬 (紅色)</option>
                <option value="flood">🔵 淹水模擬 (藍色)</option>
                <option value="fire">🟠 火災模擬 (橘色)</option>
            </select>

            <label>受災半徑: <span id="radius-val" style="color:var(--accent)">10 km</span></label>
            <input type="range" id="sim-radius" min="1" max="60" value="10">

            <button class="primary" id="btn-simulate">執行空間模擬</button>
            <button class="danger" id="btn-reset">清除所有圖層</button>
        </div>
    </div>

    <div id="middle-panel"></div>

    <div class="panel" id="right-panel">
        <h2>🤖 AI 決策助手</h2>
        <div id="chat-container">
            <div class="msg msg-ai">系統就緒。請設定模擬參數以分析潛在風險。</div>
        </div>
        <input type="text" id="user-input" placeholder="輸入指令..." onkeypress="if(event.key==='Enter') sendChat(this.value)">
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, disasterMesh;
        let buildings = [];
        
        const BASE_LON = 121.5, BASE_LAT = 23.9, LON_SCALE = 100, LAT_SCALE = 120;

        init();

        function init() {
            const container = document.getElementById('middle-panel');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020406);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
            camera.position.set(40, 50, 70);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const mapGeo = new THREE.PlaneGeometry(200, 200);
            const mapMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1 });
            const ground = new THREE.Mesh(mapGeo, mapMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            document.getElementById('btn-simulate').addEventListener('click', runSimulation);
            document.getElementById('btn-reset').addEventListener('click', clearSim);
            document.getElementById('city-select').addEventListener('change', loadData);
            document.getElementById('sim-radius').addEventListener('input', (e) => {
                document.getElementById('radius-val').innerText = `${e.target.value} km`;
            });

            loadData();
            animate();
        }

        function createBuilding(x, z, height, color) {
            const group = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(0.8, height, 0.8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = height / 2;
            group.add(body);

            const roofGeo = new THREE.ConeGeometry(0.7, 0.5, 4);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = height + 0.25;
            roof.rotation.y = Math.PI / 4;
            group.add(roof);

            group.position.set(x, 0, z);
            return group;
        }

        async function loadData() {
            const filter = document.getElementById('city-select').value;
            const res = await fetch('/api/3d_data');
            const data = await res.json();
            
            buildings.forEach(b => scene.remove(b));
            buildings = [];

            data.forEach(d => {
                if (filter !== 'all' && !d.name.includes(filter)) return;
                const x = (d.lon - BASE_LON) * LON_SCALE;
                const z = -(d.lat - BASE_LAT) * LAT_SCALE;
                const h = (d.z / 1000) * 5 + 1;
                const color = d.name.includes('YILAN') ? 0x00d4ff : 0xffcc00;
                
                const house = createBuilding(x, z, h, color);
                house.userData = { ...d, originalColor: color };
                scene.add(house);
                buildings.push(house);
            });
        }

        // 核心改動：改為呼叫後端 PostGIS，用真實空間計算結果決定變色
        async function runSimulation() {
            const [lon, lat] = document.getElementById('loc-preset').value.split(',').map(Number);
            const radius = parseFloat(document.getElementById('sim-radius').value);
            const type = document.getElementById('sim-type').value;

            // 顏色對應
            let dColor = 0xff4757;
            if (type === 'flood') dColor = 0x00d4ff;
            if (type === 'fire') dColor = 0xff8c00;

            // 畫災害圈
            if (disasterMesh) scene.remove(disasterMesh);
            const vRad = radius * 1.5;
            const geo = new THREE.RingGeometry(vRad - 0.5, vRad, 64);
            const mat = new THREE.MeshBasicMaterial({ color: dColor, side: THREE.DoubleSide });
            disasterMesh = new THREE.Mesh(geo, mat);
            const x = (lon - BASE_LON) * LON_SCALE;
            const z = -(lat - BASE_LAT) * LAT_SCALE;
            disasterMesh.position.set(x, 0.2, z);
            disasterMesh.rotation.x = -Math.PI / 2;
            scene.add(disasterMesh);

            // 先把所有建築恢復原色
            buildings.forEach(h => h.children[0].material.color.set(h.userData.originalColor));

            try {
                // 呼叫後端 PostGIS 取得真實受影響避難所
                const res = await fetch('/api/simulate_disaster', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon, radius, type })
                });
                const result = await res.json();
                const impactedNames = new Set(result.impacted_shelters.map(s => s.name));

                // 根據後端結果變色
                buildings.forEach(house => {
                    const body = house.children[0];
                    if (impactedNames.has(house.userData.name)) {
                        body.material.color.set(dColor);
                    }
                });

                addChat(`⚡ 模擬完成：[${type.toUpperCase()}] 半徑 ${radius}km，PostGIS 計算受影響避難所 ${result.impacted_count} 個`, 'ai');

            } catch (e) {
                // 後端失敗時 fallback 到前端計算
                buildings.forEach(house => {
                    const dist = house.position.distanceTo(new THREE.Vector3(x, 0, z));
                    const body = house.children[0];
                    if (dist < vRad) body.material.color.set(dColor);
                });
                addChat(`⚡ 模擬啟動（本地計算）：[${type.toUpperCase()}]，半徑 ${radius}km`, 'ai');
            }
        }

        function clearSim() {
            if (disasterMesh) scene.remove(disasterMesh);
            buildings.forEach(h => h.children[0].material.color.set(h.userData.originalColor));
            addChat("系統：已清除模擬圖層。", "ai");
        }

        function addChat(m, t) {
            const c = document.getElementById('chat-container');
            const d = document.createElement('div');
            d.className = `msg msg-${t}`;
            d.innerHTML = m;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
            return d;
        }

        async function sendChat(v) {
            if (!v) return;
            addChat(v, 'user');
            document.getElementById('user-input').value = '';

            const loadingEl = addChat('AI 思考中...', 'loading');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: v })
                });
                const data = await res.json();
                loadingEl.remove();
                addChat(data.reply, 'ai');
            } catch (e) {
                loadingEl.remove();
                addChat('連線失敗，請稍後再試', 'ai');
            }
        }

        window.sendChat = sendChat;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (disasterMesh) {
                disasterMesh.scale.multiplyScalar(1.002);
                if (disasterMesh.scale.x > 1.3) disasterMesh.scale.set(1, 1, 1);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
